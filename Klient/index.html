<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notatapplikasjon</title>
</head>
<body>
    <div class="Overskrift">
        <h1>Todo-notater</h1>
    </div>

    <div class="container">
        <h2>Skriv inn tittel til notatet og innholdet</h2>
        <button id="lagreNotat" onclick="lagreinfo()">Lagre notatet</button>
    </div>
    <div class="button2">
        <button id="hentNotater" onclick="hentinfo()">Hent notater</button>
    </div>

   <div>
        <form id="form" onsubmit="return false; ">
            <input id="input1" type="text" placeholder="Tittel">
            
            <input id="input2" type="text" placeholder="Innhold">
        </form>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
